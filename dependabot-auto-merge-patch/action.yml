name: Auto-merge Dependabot patch PRs
description: Automatically merge Dependabot patch PRs if all checks pass and there are no conflicts.

runs:
  using: composite
  steps:
      - name: Auto-merge Dependabot patch PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── 1. Fetch all open Dependabot PRs ────────────────────────────
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const dependabotPRs = pulls.filter(pr =>
              pr.user.login === 'dependabot[bot]' ||
              pr.user.login === 'dependabot'
            );

            console.log(`Dependabot PRs found: ${dependabotPRs.length}`);

            if (dependabotPRs.length === 0) {
              console.log('No open Dependabot PRs.');
              return;
            }

            // ── Helper: extract versions from PR title ───────────────────────
            // Supported formats:
            //   "Bump foo from 1.2.3 to 1.2.4"
            //   "build(deps): bump foo from 1.2.3 to 1.2.4"
            function extractVersions(title) {
              const match = title.match(
                /bump\s+\S+\s+from\s+(\d+)\.(\d+)\.(\d+)\s+to\s+(\d+)\.(\d+)\.(\d+)/i
              );
              if (!match) return null;
              return {
                fromMajor : parseInt(match[1], 10),
                fromMinor : parseInt(match[2], 10),
                fromPatch : parseInt(match[3], 10),
                toMajor   : parseInt(match[4], 10),
                toMinor   : parseInt(match[5], 10),
                toPatch   : parseInt(match[6], 10),
              };
            }

            function isPatchOnly(v) {
              return (
                v.fromMajor === v.toMajor &&
                v.fromMinor === v.toMinor &&
                v.toPatch   >  v.fromPatch
              );
            }

            // ── 2. Process each PR ───────────────────────────────────────────
            for (const pr of dependabotPRs) {
              const prLabel = `PR #${pr.number} — ${pr.title}`;
              console.log(`\n──── ${prLabel}`);

              // 2a. Check that this is a patch-only bump
              const versions = extractVersions(pr.title);
              if (!versions) {
                console.log('  ⏭  Title not recognised, skipping.');
                continue;
              }
              if (!isPatchOnly(versions)) {
                console.log(
                  `  ⏭  Bump ${versions.fromMajor}.${versions.fromMinor}.${versions.fromPatch}` +
                  ` → ${versions.toMajor}.${versions.toMinor}.${versions.toPatch}` +
                  ` (non-patch), skipping.`
                );
                continue;
              }
              console.log(
                `  ✅ Patch bump detected: ` +
                `${versions.fromMajor}.${versions.fromMinor}.${versions.fromPatch}` +
                ` → ${versions.toMajor}.${versions.toMinor}.${versions.toPatch}`
              );

              // 2b. Fetch check runs for the head commit SHA
              // Uses the modern Checks API only — no legacy statuses endpoint needed.
              const sha = pr.head.sha;

              const { data: checkRunsData } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: sha,
                per_page: 100,
              });

              const allCheckRuns = checkRunsData.check_runs;

              if (allCheckRuns.length === 0) {
                console.log('  ℹ️  No check runs found, proceeding to merge.');
              } else {
                // Skip PRs with pending check runs
                const pendingRuns = allCheckRuns.filter(r => r.status !== 'completed');

                if (pendingRuns.length > 0) {
                  console.log(`  ⏳ ${pendingRuns.length} check(s) still pending, skipping until next run.`);
                  continue;
                }

                const failedRuns = allCheckRuns.filter(r =>
                  r.conclusion !== 'success' &&
                  r.conclusion !== 'skipped'  &&
                  r.conclusion !== 'neutral'
                );

                if (failedRuns.length > 0) {
                  const names = failedRuns.map(r => `${r.name} (${r.conclusion})`).join(', ');
                  console.log(`  ❌ Failed check runs: ${names}, skipping.`);
                  continue;
                }

                console.log(`  ✅ All checks passed.`);
              }

              // 2c. Verify the PR is mergeable
              // Re-fetch the PR individually to get an up-to-date mergeable_state
              const { data: freshPR } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              if (freshPR.mergeable === false) {
                console.log('  ❌ PR is not mergeable (conflicts?), skipping.');
                continue;
              }
              if (freshPR.mergeable_state === 'blocked') {
                console.log('  ❌ PR is blocked (required reviews?), skipping.');
                continue;
              }

              // 2d. Merge the PR
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number : pr.number,
                  merge_method: 'squash',          // 'merge' | 'squash' | 'rebase'
                  commit_title: `${pr.title} (#${pr.number})`,
                });
                console.log(`  🎉 PR #${pr.number} merged successfully!`);
              } catch (err) {
                console.log(`  ❌ Merge failed: ${err.message}`);
              }
            }
